schema_version: 1

context:
  name: nomad-lab
  version: "1.4.2"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: f3effff6f14c2fde0aef7c513ac6572aee8d07b3f043c58647148429ea029808
  patches:
    - pyspy.patch

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - nomad = nomad.cli:run_cli

requirements:
  host:
    - python 3.10.*
    - setuptools >=77
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - ase >=3.25.0
    - bitarray >=2.3.5
    - cachetools >=4.2.4
    - click >=7.1.2
    - docstring_parser >=0.12
    - elasticsearch >=7.17.3
    - elasticsearch-dsl >=7,<8
    - h5py >=3.6.0
    - httpx >=0.23.3,<0.28
    - jmespath >=0.10.0
    - jsonpath-ng
    - python-kaleido <=0.2.1
    - lxml >=5.2
    - matid >=2.1.3
    - msgpack-python >=1
    - msgspec
    - numpy >=1.22.4,<2
    - openpyxl
    - orjson >=1.0
    - pandas >=2
    - pint >=0.23
    - plotly <6
    - py-spy
    - pydantic >=2
    - pyinstrument
    - pymatgen >=2023.5.10
    - python-keycloak >=0.26.1
    - python-magic
    - pytz >=2022.7.1
    - pyyaml >=6.0
    - requests >=2.27.1,<2.32.0
    - rfc3161ng >=2.1.3
    - scipy >=1.7.1
    - unidecode
    - xarray >=0.20.2
    - json_stream
    - pathvalidate
    - fsspec
    - molid

tests:
  - python:
      imports:
        - nomad
      pip_check: true
      python_version: ${{ python_min }}

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: The NOvel MAterials Discovery (NOMAD) Python package
  description: |
    This project implements the new nomad@FAIRDI infrastructure. Contrary
    to its NOMAD CoE predecessor, it implements the NOMAD Repository and
    NOMAD Archive functionality within a single cohesive application.
    This project provides all necessary artifacts to develop, test,
    deploy, and operate the NOMAD Respository and Archive.
  homepage: https://nomad-lab.eu/
  repository: https://gitlab.mpcdf.mpg.de/nomad-lab/nomad-FAIR
  documentation: https://nomad-lab.eu/prod/rae/docs/index.html

extra:
  recipe-maintainers:
    - jan-janssen
